name: Build and Deploy to GCP Cloud Run

on:
  push:
    branches:
      - production
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
  
  # Image paths
  BACKEND_IMAGE: "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/backend:latest"
  FRONTEND_IMAGE: "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/frontend:latest"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # --- BACKEND STAGE ---
      - name: Build Backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }} ./backend
          docker push ${{ env.BACKEND_IMAGE }}

      - name: Deploy Backend
        id: deploy-backend
        run: |
          gcloud run deploy entity-canvas-backend \
            --image ${{ env.BACKEND_IMAGE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "DATABASE_URL=${{ secrets.NEON_DATABASE_URL }}"

      - name: Get Backend URL
        id: get-url
        run: |
          URL=$(gcloud run services describe entity-canvas-backend --platform managed --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format 'value(status.url)')
          echo "BACKEND_URL=$URL" >> $GITHUB_ENV
          echo "::set-output name=url::$URL"

      # --- FRONTEND STAGE ---
      - name: Build Frontend
        run: |
          docker build \
            --build-arg NUXT_PUBLIC_API_URL=${{ env.BACKEND_URL }} \
            -t ${{ env.FRONTEND_IMAGE }} ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}

      - name: Deploy Frontend
        run: |
          gcloud run deploy entity-canvas-frontend \
            --image ${{ env.FRONTEND_IMAGE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars "NUXT_PUBLIC_API_URL=${{ env.BACKEND_URL }}"
