# Docker Compose for Entity Canvas
# This setup mirrors production standards (8080 internal ports, direct host mapping)

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=canvas_user
      - POSTGRES_PASSWORD=canvas_pass
      - POSTGRES_DB=entity_canvas
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvas_user -d entity_canvas"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://canvas_user:canvas_pass@db/entity_canvas
      - PORT=8080
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
