# Docker Compose for Entity Canvas
# This version is configured to connect to your EXTERNAL local Postgres database

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: entity-canvas-backend
    ports:
      - "8000:8080"
    # Load your local credentials from backend/.env
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app # Hot-reload source code locally
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: entity-canvas-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

# End of Compose
